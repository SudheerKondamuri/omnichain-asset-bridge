version: '3.8'

services:
  chain-a:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--chain-id", "1111"]
    ports:
      - "8545:8545"

  chain-b:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--port", "9545", "--chain-id", "2222"]
    ports:
      - "9545:9545"

  # Deploy contracts to both chains, then write addresses.json to shared volume
  deployer:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - relayer_data:/data
    environment:
      - CHAIN_A_RPC_URL=http://chain-a:8545
      - CHAIN_B_RPC_URL=http://chain-b:9545
      - DEPLOYER_PRIVATE_KEY=${DEPLOYER_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      - DATA_PATH=/data/addresses.json
    command: sh -c "sleep 10 && node scripts/deploy.js"
    depends_on:
      - chain-a
      - chain-b

  relayer:
    build: ./relayer
    restart: on-failure
    environment:
      - CHAIN_A_RPC_URL=http://chain-a:8545
      - CHAIN_B_RPC_URL=http://chain-b:9545
      - DEPLOYER_PRIVATE_KEY=${DEPLOYER_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      - CONFIRMATION_DEPTH=${CONFIRMATION_DEPTH:-3}
      - DB_PATH=/usr/src/app/data/relayer.db
      - ADDRESSES_PATH=/usr/src/app/data/addresses.json
    volumes:
      - relayer_data:/usr/src/app/data
    depends_on:
      deployer:
        condition: service_completed_successfully
      chain-a:
        condition: service_started
      chain-b:
        condition: service_started

volumes:
  relayer_data:
